{{- if .Values.server.enabled }}
{{ $values := merge (.Values.server) (.Values.global) }}
kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ include "netbird.server.deploymentName" . }}
  labels:
    {{- include "netbird.server.labels" . | nindent 4 }}
spec:
  replicas: 1
  revisionHistoryLimit: {{ $values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "netbird.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      name: {{ include "netbird.server.deploymentName" . }}
      labels:
        {{- include "netbird.server.selectorLabels" . | nindent 8 }}
      {{- with $values.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: Always
      {{- with $values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 6 }}
      {{- end }}
      automountServiceAccountToken: false
      volumes:
      - name: config
        secret:
          secretName: {{ include "netbird.server.configSecret" . }}
      - name: data
      {{- if .Values.server.storage.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "netbird.server.claimName" . }}
      {{- else }}
        emptyDir: {}
      {{- end }}
      containers:
      - name: netbird
        image: {{ $values.image.repository }}:{{ default .Chart.AppVersion $values.image.tag }}
        imagePullPolicy: {{ $values.image.pullPolicy }}
        args:
        - --config
        - /etc/netbird/config.yaml
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        - containerPort: 3478
          name: stun
          protocol: UDP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        livenessProbe:
          initialDelaySeconds: 5
          periodSeconds: 10
          tcpSocket:
            port: http
        readinessProbe:
          initialDelaySeconds: 5
          periodSeconds: 10
          tcpSocket:
            port: http
        volumeMounts:
        - name: config
          mountPath: /etc/netbird
        - name: data
          mountPath: /var/lib/netbird
          {{- if .Values.server.storage.subPath }}
          subPath: {{ .Values.server.storage.subPath }}
          {{- end }}
        {{- with $values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
{{- end }}
