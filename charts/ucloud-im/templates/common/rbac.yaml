{{- $name := include "ucloud.serviceAccountName" . }}
kind: ServiceAccount
apiVersion: v1
metadata:
  name: {{ $name }}
  namespace: {{ include "ucloud.namespace.release" . }}
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ $name }}-cluster-role
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "watch", "list"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ $name }}-cluster-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $name }}-cluster-role
subjects:
- kind: ServiceAccount
  name: {{ $name }}
  namespace: {{ include "ucloud.namespace.release" . }}
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ $name }}-apps
  namespace: {{ include "ucloud.namespace.apps" . }}
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/exec", "services", "events"]
  verbs: ["*"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["*"]
- apiGroups: ["kubevirt.io"]
  resources: ["*"]
  verbs: ["*"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ $name }}-apps
  namespace: {{ include "ucloud.namespace.apps" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-apps
subjects:
- kind: ServiceAccount
  name: {{ $name }}
  namespace: {{ include "ucloud.namespace.release" . }}
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ $name }}-tasks
  namespace: {{ include "ucloud.namespace.tasks" . }}
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["*"]
- apiGroups: [""]
  resources: ["deployments", "services"]
  verbs: ["*"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ $name }}-tasks
  namespace: {{ include "ucloud.namespace.tasks" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-tasks
subjects:
- kind: ServiceAccount
  name: {{ $name }}
  namespace: {{ include "ucloud.namespace.release" . }}
